<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>居家物資管理系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 html5-qrcode 條碼掃描庫 -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdfbf7; color: #4a4a4a; overflow-x: hidden; width: 100%; }
        .tab-active { border-bottom: 3px solid #b91c1c; color: #b91c1c; font-weight: 700; }
        .tab-inactive { color: #9ca3af; border-bottom: 3px solid transparent; }
        .tab-inactive:hover { color: #4b5563; }
        .filter-chip.active { background-color: #4a4a4a; color: white; }
        .tag-filter.active { background-color: #b91c1c; color: white; border-color: #b91c1c; }
        .settings-tag-chip { transition: all 0.2s; }
        .settings-tag-chip.editing { background-color: #fef3c7; border-color: #f59e0b; color: #b45309; transform: scale(1.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); transition: transform 0.2s; }
        .view-section { transition: opacity 0.3s ease-in-out; }
        .hidden-view { display: none; opacity: 0; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #b91c1c; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 調整 Scanner 樣式 */
        #reader video { object-fit: cover; border-radius: 0.5rem; }
    </style>
</head>
<body class="min-h-screen pb-24 relative w-full">

    <header class="bg-white sticky top-0 z-40 shadow-sm w-full">
        <div class="max-w-md mx-auto px-4 pt-4 pb-0 w-full">
            <div class="flex justify-between items-center mb-3 relative">
                <div class="w-8"></div> 
                <h1 class="text-xl font-bold tracking-wider flex items-center justify-center">
                    <i class="fa-solid fa-house-chimney mr-2 text-stone-600"></i>居家物資
                </h1>
                <button onclick="toggleSettings()" class="w-8 h-8 flex items-center justify-center text-stone-400 hover:text-stone-600 transition">
                    <i class="fa-solid fa-gear text-lg" id="settings-icon"></i>
                </button>
            </div>
            
            <div id="main-header-content">
                <div class="relative mb-3">
                    <input type="text" id="searchInput" placeholder="搜尋物品名稱..." oninput="searchTerm = this.value; renderCards();"
                        class="w-full bg-stone-100 border-none rounded-full py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-stone-300 outline-none transition">
                    <i class="fa-solid fa-search absolute left-4 top-2.5 text-stone-400"></i>
                </div>

                <div class="flex justify-between text-center border-b border-stone-200">
                    <button onclick="switchTab('food')" id="tab-food" class="tab-active py-2 flex-1 transition-all">
                        <span class="block text-lg mb-0.5">🍱</span><span class="text-xs font-bold">飲食</span>
                    </button>
                    <button onclick="switchTab('living')" id="tab-living" class="tab-inactive py-2 flex-1 transition-all">
                        <span class="block text-lg mb-0.5">🧻</span><span class="text-xs font-bold">日用</span>
                    </button>
                    <button onclick="switchTab('beauty')" id="tab-beauty" class="tab-inactive py-2 flex-1 transition-all">
                        <span class="block text-lg mb-0.5">💄</span><span class="text-xs font-bold">美妝</span>
                    </button>
                    <button onclick="switchTab('shopping')" id="tab-shopping" class="tab-inactive py-2 flex-1 transition-all border-l border-stone-100 bg-stone-50">
                        <span class="block text-lg mb-0.5">🛒</span><span class="text-xs font-bold text-stone-600">待買</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div id="view-main" class="view-section w-full">
        <div id="loading-indicator" class="hidden text-center py-2 bg-stone-50 text-xs text-stone-500">
            <div class="flex justify-center items-center gap-2"><div class="spinner"></div> 正在從 Google 讀取資料...</div>
        </div>
        <div id="sync-overlay" class="fixed inset-0 bg-black/30 z-[70] hidden flex items-center justify-center backdrop-blur-sm">
             <div class="bg-white p-4 rounded-xl shadow-lg flex items-center gap-3">
                <div class="spinner"></div><span class="text-sm font-bold text-stone-600">正在寫入雲端...</span>
             </div>
        </div>

        <div id="alert-banner" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mx-auto max-w-md mt-4 text-sm shadow-sm animate-pulse w-full box-border" role="alert">
            <p class="font-bold"><i class="fa-solid fa-circle-exclamation mr-1"></i> 注意！</p>
            <p id="alert-text">有 X 項商品即將過期。</p>
        </div>

        <main class="max-w-md mx-auto px-4 mt-4 w-full">
            <div id="sub-filters" class="flex overflow-x-auto gap-2 pb-2 mb-2 hide-scrollbar w-full"></div>
            <div id="tag-filters-container" class="flex overflow-x-auto gap-2 pb-2 mb-4 hide-scrollbar w-full border-t border-stone-100 pt-2"></div>
            <div id="item-container" class="grid grid-cols-1 gap-4 w-full"></div>
        </main>

        <button onclick="openAddModal()" class="fixed bottom-6 right-6 bg-red-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:bg-red-800 transition active:scale-90 z-50">
            <i class="fa-solid fa-plus text-2xl"></i>
        </button>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view-section hidden-view max-w-md mx-auto px-4 mt-6 pb-20 w-full">
        <h2 class="text-lg font-bold text-stone-700 mb-4 px-2 border-l-4 border-red-700">分類管理</h2>
        <div class="space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-100">
                <h3 class="font-bold text-stone-600 mb-3">🍱 飲食類別 (Food)</h3>
                <div class="flex flex-wrap gap-2 mb-3" id="settings-tags-food"></div>
                <div class="flex gap-2">
                    <input type="text" id="new-tag-food" placeholder="新增分類..." class="flex-1 bg-stone-50 border border-stone-200 rounded px-3 py-1 text-sm outline-none min-w-0">
                    <button onclick="window.addCategory('food')" class="bg-stone-600 text-white px-3 py-1 rounded text-sm hover:bg-stone-700 whitespace-nowrap">新增</button>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-100">
                <h3 class="font-bold text-stone-600 mb-3">🧻 日用類別 (Living)</h3>
                <div class="flex flex-wrap gap-2 mb-3" id="settings-tags-living"></div>
                <div class="flex gap-2">
                    <input type="text" id="new-tag-living" placeholder="新增分類..." class="flex-1 bg-stone-50 border border-stone-200 rounded px-3 py-1 text-sm outline-none min-w-0">
                    <button onclick="window.addCategory('living')" class="bg-stone-600 text-white px-3 py-1 rounded text-sm hover:bg-stone-700 whitespace-nowrap">新增</button>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-100">
                <h3 class="font-bold text-stone-600 mb-3">💄 美妝類別 (Beauty)</h3>
                <div class="flex flex-wrap gap-2 mb-3" id="settings-tags-beauty"></div>
                <div class="flex gap-2">
                    <input type="text" id="new-tag-beauty" placeholder="新增分類..." class="flex-1 bg-stone-50 border border-stone-200 rounded px-3 py-1 text-sm outline-none min-w-0">
                    <button onclick="window.addCategory('beauty')" class="bg-stone-600 text-white px-3 py-1 rounded text-sm hover:bg-stone-700 whitespace-nowrap">新增</button>
                </div>
            </div>
        </div>
        <h2 class="text-lg font-bold text-stone-700 mb-4 mt-8 px-2 border-l-4 border-yellow-500">常用標籤管理</h2>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-100">
            <div class="flex flex-wrap gap-2 mb-4" id="settings-common-tags"></div>
            <div class="flex flex-col gap-2 bg-stone-50 p-3 rounded-lg border border-stone-200">
                <label class="text-xs font-bold text-stone-500 uppercase" id="tag-input-label">新增標籤</label>
                <div class="flex gap-2">
                    <input type="text" id="new-common-tag" placeholder="輸入標籤名稱..." class="flex-1 bg-white border border-stone-300 rounded px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-yellow-400 min-w-0">
                    <button id="btn-save-tag" onclick="window.handleSaveTag()" class="bg-stone-600 text-white px-4 py-2 rounded text-sm hover:bg-stone-700 font-medium whitespace-nowrap shadow-sm">新增</button>
                </div>
                <div id="edit-tag-actions" class="hidden flex gap-2 justify-end mt-1">
                    <button onclick="window.handleDeleteTag()" class="text-red-500 hover:text-red-700 text-xs px-2 py-1 font-bold flex items-center"><i class="fa-solid fa-trash-can mr-1"></i> 刪除此標籤</button>
                    <button onclick="window.cancelEditCommonTag()" class="text-stone-400 hover:text-stone-600 text-xs px-2 py-1 font-bold border border-stone-300 rounded bg-white">取消</button>
                </div>
            </div>
        </div>
        <h2 class="text-lg font-bold text-stone-700 mb-4 mt-8 px-2 border-l-4 border-stone-500">系統連結</h2>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-100">
            <label class="block text-xs font-bold text-stone-500 mb-2 uppercase">Google Web App URL</label>
            <input type="text" id="settings-api-url" placeholder="https://script.google.com/..." class="w-full bg-stone-50 border border-stone-200 rounded px-3 py-2 text-sm outline-none focus:border-red-300 mb-2">
            <div class="flex gap-2">
                <button onclick="saveApiUrl()" class="flex-1 bg-stone-700 text-white py-2 rounded text-sm font-bold hover:bg-stone-800">儲存並同步</button>
                <button onclick="fetchCloudData()" class="px-4 bg-stone-200 text-stone-600 rounded text-sm font-bold hover:bg-stone-300" title="強制重新整理"><i class="fa-solid fa-sync"></i></button>
            </div>
            <div class="mt-4 pt-4 border-t border-stone-100">
                <button onclick="window.debugCloudData()" class="w-full text-stone-400 text-xs hover:text-stone-600 flex items-center justify-center gap-1">
                    <i class="fa-solid fa-bug"></i> 檢查資料欄位
                </button>
            </div>
        </div>
        <div class="mt-8 text-center pb-8"><button onclick="resetToDefaults()" class="text-red-400 text-xs underline hover:text-red-600">重置所有設定</button></div>
    </div>

    <!-- Modal: 新增/編輯 -->
    <div id="add-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center backdrop-blur-sm p-4 w-full h-full">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0 flex flex-col max-h-[90vh]" id="modal-content">
            <div class="bg-stone-100 px-6 py-4 border-b border-stone-200 flex justify-between items-center flex-shrink-0">
                <h3 id="modal-title" class="font-bold text-lg text-stone-700">新增物品</h3>
                <button onclick="closeModal('add-modal')" class="text-stone-400 hover:text-stone-600"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            <form id="add-form" class="p-6 space-y-4 overflow-y-auto flex-1">
                <input type="hidden" id="edit-id" value="">
                <input type="hidden" id="input-status" value="in_stock">
                
                <!-- 新增：條碼輸入與掃描按鈕 -->
                <div>
                    <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">條碼 (記憶鑰匙)</label>
                    <div class="flex gap-2">
                        <input type="text" id="input-barcode" placeholder="點擊右側相機掃描..." class="flex-1 bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-stone-400 outline-none">
                        <button type="button" onclick="startScanner()" class="bg-stone-700 text-white px-4 py-2 rounded-lg hover:bg-stone-800 transition flex items-center justify-center shadow-sm">
                            <i class="fa-solid fa-barcode mr-1"></i> 掃描
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">名稱 *</label>
                    <input type="text" id="input-name" required placeholder="例如：統一麵肉燥風味" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-200 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">類型</label>
                        <select id="input-type" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-200 outline-none" onchange="updateModalCategoryOptions()">
                            <option value="food">飲食 (Food)</option>
                            <option value="living">生活 (Living)</option>
                            <option value="beauty">美妝 (Beauty)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">分類</label>
                        <select id="input-category" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-200 outline-none"></select>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div id="modal-expiry-container" class="col-span-1">
                        <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">有效期限 *</label>
                        <input type="date" id="input-expiry" required class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-200 outline-none text-stone-600">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">數量</label>
                        <input type="number" id="input-qty" value="1" min="1" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-200 outline-none">
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">標籤 (Tags)</label>
                    <input type="text" id="input-tags" placeholder="需微波, 辣味..." class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-200 outline-none">
                    <div id="modal-quick-tags" class="flex flex-wrap gap-2 mt-2"></div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">備註 (Notes)</label>
                    <textarea id="input-notes" rows="2" placeholder="備註事項..." class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-200 outline-none"></textarea>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-red-700 text-white font-bold py-3 rounded-lg shadow-md hover:bg-red-800 transition transform active:scale-95 mt-4 flex-shrink-0 flex items-center justify-center">
                    <span id="submit-btn-text">加入庫存</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Modal: 條碼掃描畫面 -->
    <div id="scanner-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex flex-col items-center justify-center p-4 w-full h-full backdrop-blur-sm">
        <div class="w-full max-w-sm bg-white rounded-2xl overflow-hidden relative shadow-2xl">
            <div class="bg-stone-100 px-4 py-3 flex justify-between items-center z-10 relative border-b border-stone-200">
                <h3 class="font-bold text-stone-700">對準條碼掃描</h3>
                <button type="button" onclick="stopScanner()" class="text-stone-400 hover:text-red-600 transition"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            <!-- 相機預覽區域 -->
            <div id="reader" class="w-full bg-black min-h-[250px]"></div>
        </div>
        <p class="text-white text-sm mt-4 font-medium tracking-wide"><i class="fa-solid fa-expand mr-2"></i>請將條碼置中於方框內</p>
    </div>

    <!-- Modal: 快速補貨 (Restock) -->
    <div id="restock-modal" class="fixed inset-0 bg-black/60 z-[80] hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 transform transition-all scale-95 opacity-0" id="restock-content">
            <h3 class="text-xl font-bold text-stone-800 mb-2">📦 補貨入庫</h3>
            <p id="restock-item-name" class="text-stone-500 text-sm mb-4">商品名稱</p>
            <form id="restock-form" class="space-y-4">
                <input type="hidden" id="restock-id">
                <div>
                    <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">新的有效期限 *</label>
                    <input type="date" id="restock-expiry" required class="w-full bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-lg focus:ring-2 focus:ring-yellow-400 outline-none text-stone-700 font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-stone-500 mb-1 uppercase">補貨數量</label>
                    <input type="number" id="restock-qty" value="1" min="1" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 outline-none">
                </div>
                <div class="flex gap-3 mt-4">
                    <button type="button" onclick="closeModal('restock-modal')" class="flex-1 py-3 rounded-lg border border-stone-300 text-stone-500 font-bold">取消</button>
                    <button type="submit" class="flex-1 py-3 rounded-lg bg-green-600 text-white font-bold shadow-md hover:bg-green-700">確認入庫</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. 設定與資料
        const defaultCategories = {
            food: ['料理包', '麵類', '湯底', '零食', '飲料', '調味料', '冰箱'],
            living: ['清潔', '日用', '廚房', '衛浴', '收納'],
            beauty: ['保養', '化妝', '香氛', '髮品']
        };
        const defaultCommonTags = ['需微波', '需冷藏', '2-3人份', '辣味', '朋友送的', '快過期'];
        
        let categoryOptions = JSON.parse(localStorage.getItem('myInventoryCategories')) || JSON.parse(JSON.stringify(defaultCategories));
        let commonTags = JSON.parse(localStorage.getItem('myInventoryCommonTags')) || defaultCommonTags;

        let inventory = [];
        let currentTab = 'food';
        let currentFilter = 'all'; 
        let currentTagFilter = null; 
        let searchTerm = '';
        let isSettingsOpen = false;
        let editingTagOriginalValue = null;

        // ===== 條碼掃描功能 (Html5Qrcode) =====
        let html5QrCode = null;

        function startScanner() {
            document.getElementById('scanner-modal').classList.remove('hidden');
            
            // 實例化掃描器
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 }, aspectRatio: 1.333334 };
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                alert("無法啟動相機，請確認瀏覽器已給予相機權限！");
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    document.getElementById('scanner-modal').classList.add('hidden');
                }).catch(err => console.error(err));
            } else {
                document.getElementById('scanner-modal').classList.add('hidden');
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // 掃描成功，關閉相機
            stopScanner();
            
            // 填入條碼欄位
            document.getElementById('input-barcode').value = decodedText;
            
            // 觸發「記憶鑰匙」功能：尋找過往紀錄
            autoFillFromMemory(decodedText);
        }
        
        function autoFillFromMemory(barcode) {
            // 從庫存中反向尋找 (尋找最新建立的相同條碼紀錄)
            const pastItem = [...inventory].reverse().find(item => item.barcode === barcode);
            
            if (pastItem) {
                document.getElementById('input-name').value = pastItem.name;
                document.getElementById('input-type').value = pastItem.type;
                updateModalCategoryOptions(); // 根據 type 更新次分類下拉選單
                document.getElementById('input-category').value = pastItem.category;
                document.getElementById('input-tags').value = pastItem.tags || "";
                
                // 視覺與聽覺回饋 (如果手機未靜音)
                alert(`✨ 找到過往紀錄！已自動為您帶入「${pastItem.name}」的分類與標籤。\n請確認「有效期限」與「數量」後即可送出。`);
            } else {
                alert(`📦 這是新商品！請為它輸入名稱與分類，系統會自動記住這個條碼喔！`);
            }
        }
        // ===== 條碼掃描功能結束 =====

        // --- Helper Functions ---
        function getDaysRemaining(dateString) {
            if (!dateString) return 999;
            const today = new Date(); today.setHours(0,0,0,0);
            const expiry = new Date(dateString);
            return Math.ceil((expiry - today) / (1000 * 60 * 60 * 24)); 
        }

        function getStatusInfo(days) {
            if (days < 0) return { text: `過期 ${Math.abs(days)} 天`, class: "bg-stone-800 text-white", icon: "fa-skull" };
            if (days === 0) return { text: "今天到期", class: "bg-red-600 text-white", icon: "fa-exclamation-circle" };
            if (days <= 60) return { text: `剩 ${days} 天`, class: "bg-red-100 text-red-700 border border-red-200", icon: "fa-fire" };
            if (days <= 180) return { text: `剩 ${days} 天`, class: "bg-yellow-100 text-yellow-800 border border-yellow-200", icon: "fa-calendar-exclamation" };
            return { text: `剩 ${days} 天`, class: "bg-green-100 text-green-800 border border-green-200", icon: "fa-check" };
        }

        function updateAlertBanner() {
            let urgentCount = 0;
            if (inventory.length > 0 && currentTab !== 'shopping') {
                inventory.filter(item => item.type === currentTab && item.status !== 'to_buy').forEach(item => {
                    if (getDaysRemaining(item.expiry) <= 60) urgentCount++;
                });
            }
            const banner = document.getElementById('alert-banner');
            const tabNames = { food: '飲食', living: '日用', beauty: '美妝', shopping: '待買' };
            if (urgentCount > 0) {
                banner.classList.remove('hidden');
                document.getElementById('alert-text').innerHTML = `您的 <b>${tabNames[currentTab] || ''}</b> 庫存中，有 <span class="text-xl font-bold">${urgentCount}</span> 項物品即將在 2 個月內過期！`;
            } else {
                banner.classList.add('hidden');
            }
        }

        // --- 核心：雲端 CRUD 功能 ---
        async function saveToCloud(action, data) {
            const apiUrl = localStorage.getItem('myInventoryApiUrl');
            if (!apiUrl) { alert("請先在設定頁面設定 Google Web App URL！"); return null; }
            document.getElementById('sync-overlay').classList.remove('hidden');
            try {
                const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: action, ...data }) });
                const result = await response.json();
                if (result.status === 'success') return result; else throw new Error(result.message);
            } catch (error) { alert(`同步失敗：${error.message}`); return null; } finally { document.getElementById('sync-overlay').classList.add('hidden'); }
        }

        async function fetchCloudData() {
            const apiUrl = localStorage.getItem('myInventoryApiUrl');
            if (!apiUrl) return; 
            document.getElementById('loading-indicator').classList.remove('hidden');
            try {
                const response = await fetch(`${apiUrl}?t=${new Date().getTime()}`);
                const data = await response.json();
                inventory = Array.isArray(data) ? data.map(item => ({...item, id: String(item.id), status: (item.status||'in_stock').trim().toLowerCase() || 'in_stock', barcode: item.barcode || ""})) : [];
                renderCards();
            } catch (error) { alert(`讀取失敗：\n${error.message}`); } finally { document.getElementById('loading-indicator').classList.add('hidden'); }
        }

        async function debugCloudData() {
             const apiUrl = localStorage.getItem('myInventoryApiUrl');
             if (!apiUrl) return alert("未設定網址");
             
             try {
                 const response = await fetch(`${apiUrl}?t=${new Date().getTime()}`);
                 const data = await response.json();
                 if(data.length > 0) {
                     const firstItem = data[0];
                     let msg = "Google 回傳的第一筆資料欄位：\n\n";
                     for (const key in firstItem) {
                         msg += `${key}: ${firstItem[key]}\n`;
                     }
                     if (!firstItem.hasOwnProperty('status')) {
                         msg += "\n⚠️ 警告：找不到 'status' 欄位！\n這代表 Google Apps Script 可能未正確部署新版本，或是 Sheet 的 K1 標題不是 'status'。";
                     } else {
                         msg += "\n✅ 狀態：欄位正常，包含 status。";
                     }
                     alert(msg);
                 } else {
                     alert("Google Sheet 目前是空的，無法檢查欄位。");
                 }
             } catch (e) {
                 alert("連線錯誤：" + e.message);
             }
        }

        // --- 4. UI 渲染 ---
        function initFilters() {
            const container = document.getElementById('sub-filters');
            container.innerHTML = '';
            if (currentTab === 'shopping') {
                container.innerHTML = '<div class="text-xs text-stone-400 py-1 px-2">🛒 點擊「入庫」即可將物品移回庫存</div>';
            } else {
                const allBtn = document.createElement('button');
                allBtn.className = `filter-chip px-4 py-1.5 rounded-full text-xs font-medium transition whitespace-nowrap bg-stone-200 text-stone-600 hover:bg-stone-300 ${currentFilter === 'all' ? 'active' : ''}`;
                allBtn.innerText = '全部顯示';
                allBtn.onclick = () => { currentFilter = 'all'; initFilters(); renderCards(); };
                container.appendChild(allBtn);
                (categoryOptions[currentTab] || []).forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = `filter-chip px-4 py-1.5 rounded-full text-xs font-medium transition whitespace-nowrap bg-stone-200 text-stone-600 hover:bg-stone-300 ${cat === currentFilter ? 'active' : ''}`;
                    btn.innerText = cat === '冰箱' ? '❄️ 冰箱' : cat;
                    btn.onclick = () => { currentFilter = cat; initFilters(); renderCards(); };
                    container.appendChild(btn);
                });
            }
            initTagFilters();
        }

        function initTagFilters() {
            const tagContainer = document.getElementById('tag-filters-container');
            tagContainer.innerHTML = '';
            if (commonTags.length === 0) { tagContainer.classList.add('hidden'); return; }
            tagContainer.classList.remove('hidden');
            commonTags.forEach(tag => {
                const btn = document.createElement('button');
                const isActive = currentTagFilter === tag;
                btn.className = `px-3 py-1 rounded-full text-[11px] border transition whitespace-nowrap tag-filter ${isActive ? "bg-stone-500 text-white border-stone-500" : "bg-white text-stone-500 border-stone-200 hover:border-stone-400"}`;
                btn.innerHTML = `<i class="fa-solid fa-tag mr-1"></i>${tag}`;
                btn.onclick = () => { currentTagFilter = currentTagFilter === tag ? null : tag; initTagFilters(); renderCards(); };
                tagContainer.appendChild(btn);
            });
        }

        function switchTab(tabName) {
            if (isSettingsOpen) toggleSettings();
            currentTab = tabName; currentFilter = 'all'; currentTagFilter = null; 
            ['food', 'living', 'beauty', 'shopping'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                el.className = (t === tabName) ? `tab-active py-2 flex-1 transition-all ${t==='shopping'?'bg-stone-100 border-l border-stone-200':''}` : `tab-inactive py-2 flex-1 transition-all ${t==='shopping'?'bg-stone-50 border-l border-stone-100':''}`;
            });
            initFilters(); renderCards(); updateModalCategoryOptions();
            document.getElementById('input-type').value = (tabName === 'shopping') ? 'food' : tabName;
        }

        function renderCards() {
            const container = document.getElementById('item-container');
            let htmlContent = ''; 

            let filteredData = inventory.filter(item => {
                if (currentTab === 'shopping' && item.status !== 'to_buy') return false;
                if (currentTab !== 'shopping' && (item.status === 'to_buy' || item.type !== currentTab)) return false;
                const search = searchTerm.toLowerCase();
                if (!String(item.name||'').toLowerCase().includes(search) && !String(item.brand||'').toLowerCase().includes(search)) return false;
                if (currentTab !== 'shopping') {
                    if (currentFilter !== 'all' && item.category !== currentFilter) return false;
                    if (currentTagFilter && !String(item.tags||'').toLowerCase().includes(currentTagFilter.toLowerCase())) return false;
                }
                return true;
            });

            if (currentTab === 'shopping') filteredData.sort((a, b) => String(a.name||'').localeCompare(String(b.name||'')));
            else filteredData.sort((a, b) => getDaysRemaining(a.expiry) - getDaysRemaining(b.expiry));
            
            updateAlertBanner();

            if (filteredData.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-stone-400"><i class="fa-solid fa-box-open text-4xl mb-3 opacity-30"></i><p>這裡空空的...</p></div>`; return;
            }

            filteredData.forEach(item => {
                const itemId = String(item.id); 
                let tagsHtml = String(item.tags || '').split(/[ ,，]+/).map(t => t ? `<span class="text-[10px] text-stone-400 px-1 py-0.5 bg-stone-100 rounded mr-1">#${t}</span>` : '').join('');
                
                // 新增：如果商品有條碼綁定，在卡片名稱旁顯示一個小條碼 icon
                const barcodeIcon = item.barcode ? `<i class="fa-solid fa-barcode text-stone-300 ml-2 text-[10px]" title="已綁定條碼"></i>` : '';

                let cardActionHtml = '', statusBadgeHtml = '';
                if (currentTab === 'shopping') {
                    statusBadgeHtml = `<span class="bg-stone-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">待採買</span>`;
                    cardActionHtml = `
                        <div class="flex gap-1 items-center w-full justify-end">
                            <button onclick="window.editItem('${itemId}')" class="text-stone-400 hover:text-blue-600 p-2"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="window.deleteItem('${itemId}')" class="text-stone-400 hover:text-red-600 p-2"><i class="fa-solid fa-trash-can"></i></button>
                            <button onclick="window.confirmRestock('${itemId}')" class="bg-green-600 text-white text-xs px-3 py-2 rounded shadow hover:bg-green-700 flex items-center ml-1"><i class="fa-solid fa-check mr-1"></i> 入庫</button>
                        </div>`;
                } else {
                    const status = getStatusInfo(getDaysRemaining(item.expiry));
                    statusBadgeHtml = `<span class="${status.class} text-[10px] font-bold px-2 py-0.5 rounded-full whitespace-nowrap"><i class="fa-solid ${status.icon} mr-1"></i>${status.text}</span>`;
                    cardActionHtml = `
                        <div class="text-[10px] text-stone-400 mr-auto">效期: ${item.expiry ? item.expiry.substring(0, 10) : '未設定'}</div>
                        <button onclick="window.decreaseQty('${itemId}')" class="text-stone-400 hover:text-orange-600 p-2" title="-1"><i class="fa-solid fa-minus"></i></button>
                        <button onclick="window.editItem('${itemId}')" class="text-stone-400 hover:text-blue-600 p-2"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="window.deleteItem('${itemId}')" class="text-stone-400 hover:text-red-600 p-2"><i class="fa-solid fa-trash-can"></i></button>
                    `;
                }

                htmlContent += `
                <div class="bg-white rounded-xl overflow-hidden card-shadow p-4 relative border border-stone-100 mb-4">
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex flex-col flex-1 mr-2">
                            <span class="text-[10px] font-bold text-stone-400 tracking-wide uppercase truncate pr-2">${item.brand || ''}</span>
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-stone-800 text-base leading-tight line-clamp-1">${item.name}${barcodeIcon}</h3>
                                <span class="bg-stone-100 text-stone-600 text-[10px] font-bold px-1.5 py-0.5 rounded">x${item.qty}</span>
                            </div>
                        </div>
                        ${statusBadgeHtml}
                    </div>
                    <div class="mt-2 flex flex-wrap gap-1 items-center">
                        <span class="text-[10px] bg-stone-200 text-stone-600 px-1.5 py-0.5 rounded font-medium">${item.category}</span>
                        ${tagsHtml}
                    </div>
                    ${item.notes ? `<div class="mt-2 text-[11px] text-stone-500 bg-yellow-50 p-2 rounded border border-yellow-100 flex items-start"><i class="fa-regular fa-sticky-note mr-1 mt-0.5 text-yellow-600"></i>${item.notes}</div>` : ''}
                    <div class="flex justify-between items-center mt-3 pt-2 border-t border-stone-50">${cardActionHtml}</div>
                </div>`;
            });
            container.innerHTML = htmlContent;
        }

        // --- User Actions ---
        window.decreaseQty = async function(id) {
            const item = inventory.find(i => i.id === id);
            if (!item) return;
            if (parseInt(item.qty) > 1) {
                if (!confirm(`確定要減少「${item.name}」的數量嗎？ (目前 ${item.qty} 個)`)) return;
                item.qty--; await saveToCloud('update', item); renderCards();
            } else {
                if (confirm(`「${item.name}」只剩 1 個了！\n\n按「確定」：加入採買清單\n按「取消」：維持現狀`)) {
                    item.status = 'to_buy'; item.qty = 1; await saveToCloud('update', item); switchTab('shopping');
                }
            }
        }

        window.confirmRestock = function(id) {
            const item = inventory.find(i => i.id === id);
            if (!item) return;
            document.getElementById('restock-id').value = id;
            document.getElementById('restock-item-name').innerText = item.name;
            document.getElementById('restock-expiry').valueAsDate = new Date(); 
            document.getElementById('restock-qty').value = 1;
            const modal = document.getElementById('restock-modal');
            modal.classList.remove('hidden'); setTimeout(() => { document.getElementById('restock-content').classList.remove('scale-95', 'opacity-0'); document.getElementById('restock-content').classList.add('scale-100', 'opacity-100'); }, 10);
        }

        document.getElementById('restock-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('restock-id').value;
            const item = inventory.find(i => i.id === id);
            if (item) {
                const updatedItem = { ...item, status: 'in_stock', expiry: document.getElementById('restock-expiry').value, qty: parseInt(document.getElementById('restock-qty').value) };
                closeModal('restock-modal');
                if(await saveToCloud('update', updatedItem)) {
                    inventory[inventory.findIndex(i => i.id === id)] = updatedItem; alert(`✅ ${item.name} 已入庫！`); switchTab(item.type); 
                }
            }
        });

        window.deleteItem = async function(id) {
            if(!confirm("確定要刪除嗎？")) return;
            if(await saveToCloud('delete', { id: id })) { inventory = inventory.filter(i => i.id !== id); renderCards(); }
        }

        window.editItem = function(id) {
            const item = inventory.find(i => i.id === id);
            if (!item) return;
            
            const isToBuy = item.status === 'to_buy';
            const expiryContainer = document.getElementById('modal-expiry-container');
            const expiryInput = document.getElementById('input-expiry');
            
            if (isToBuy) { expiryContainer.classList.add('hidden'); expiryInput.required = false; } 
            else { expiryContainer.classList.remove('hidden'); expiryInput.required = true; }

            document.getElementById('edit-id').value = item.id;
            document.getElementById('input-status').value = item.status; 
            document.getElementById('input-barcode').value = item.barcode || ""; // 填入現有條碼
            document.getElementById('input-type').value = item.type;
            updateModalCategoryOptions();
            document.getElementById('input-name').value = item.name;
            document.getElementById('input-category').value = item.category;
            document.getElementById('input-qty').value = item.qty;
            if (item.expiry) document.getElementById('input-expiry').value = item.expiry.substring(0, 10);
            document.getElementById('input-tags').value = item.tags;
            document.getElementById('input-notes').value = item.notes;
            document.getElementById('modal-title').innerText = "編輯物品";
            document.getElementById('submit-btn-text').innerText = "更新資料";
            
            const modal = document.getElementById('add-modal');
            modal.classList.remove('hidden');
            setTimeout(() => { document.getElementById('modal-content').classList.remove('scale-95', 'opacity-0'); document.getElementById('modal-content').classList.add('scale-100', 'opacity-100'); }, 10);
            renderModalQuickTags();
        }

        // --- Settings Management ---
        function toggleSettings() { isSettingsOpen = !isSettingsOpen; const v = document.getElementById('view-settings'), m = document.getElementById('view-main'), h = document.getElementById('main-header-content'), i = document.getElementById('settings-icon'); if (isSettingsOpen) { m.classList.add('hidden-view'); h.classList.add('hidden'); v.classList.remove('hidden-view'); i.className = "fa-solid fa-times text-lg text-stone-800"; renderSettingsCategories(); renderSettingsCommonTags(); cancelEditCommonTag(); document.getElementById('settings-api-url').value = localStorage.getItem('myInventoryApiUrl') || ''; } else { v.classList.add('hidden-view'); m.classList.remove('hidden-view'); h.classList.remove('hidden'); i.className = "fa-solid fa-gear text-lg"; initFilters(); renderCards(); } }
        function renderSettingsCategories() { ['food', 'living', 'beauty'].forEach(t => { const c = document.getElementById(`settings-tags-${t}`); c.innerHTML = ''; (categoryOptions[t] || []).forEach(cat => { const tag = document.createElement('div'); tag.className = "flex items-center bg-stone-100 text-stone-600 px-3 py-1 rounded-full text-sm mb-1 mr-1"; tag.innerHTML = `<span>${cat}</span><button onclick="window.removeCategory('${t}', '${cat}')" class="ml-2 text-stone-400 hover:text-red-500 p-1"><i class="fa-solid fa-times-circle"></i></button>`; c.appendChild(tag); }); }); }
        function renderSettingsCommonTags() { const c = document.getElementById('settings-common-tags'); c.innerHTML = ''; commonTags.forEach(tag => { const b = document.createElement('button'); const isEditing = editingTagOriginalValue === tag; b.className = `flex items-center px-3 py-2 rounded-lg text-sm border font-medium transition settings-tag-chip ${isEditing ? "bg-yellow-100 border-yellow-400 text-yellow-800 ring-2 ring-yellow-200 editing" : "bg-white border-stone-200 text-stone-600 hover:bg-stone-50 hover:border-stone-300"}`; b.innerHTML = `<i class="fa-solid fa-tag mr-2 text-xs opacity-70"></i>${tag}`; b.onclick = function() { window.startEditingTag(tag); }; c.appendChild(b); }); }
        window.startEditingTag = function(tag) { editingTagOriginalValue = tag; const i = document.getElementById('new-common-tag'); i.value = tag; i.focus(); document.getElementById('tag-input-label').innerText = "編輯標籤"; document.getElementById('btn-save-tag').innerText = "更新"; document.getElementById('btn-save-tag').className = "bg-yellow-600 text-white px-4 py-2 rounded text-sm hover:bg-yellow-700 font-medium whitespace-nowrap shadow-sm"; document.getElementById('edit-tag-actions').classList.remove('hidden'); renderSettingsCommonTags(); }
        window.cancelEditCommonTag = function() { editingTagOriginalValue = null; document.getElementById('new-common-tag').value = ''; document.getElementById('tag-input-label').innerText = "新增標籤"; document.getElementById('btn-save-tag').innerText = "新增"; document.getElementById('btn-save-tag').className = "bg-stone-600 text-white px-4 py-2 rounded text-sm hover:bg-stone-700 font-medium whitespace-nowrap shadow-sm"; document.getElementById('edit-tag-actions').classList.add('hidden'); renderSettingsCommonTags(); }
        window.handleSaveTag = function() { const val = document.getElementById('new-common-tag').value.trim(); if (!val) return; if (editingTagOriginalValue) { if (commonTags.includes(val) && val !== editingTagOriginalValue) return alert("標籤已存在"); const index = commonTags.indexOf(editingTagOriginalValue); if (index !== -1) commonTags[index] = val; } else { if (!commonTags.includes(val)) commonTags.push(val); else return alert("標籤已存在"); } localStorage.setItem('myInventoryCommonTags', JSON.stringify(commonTags)); cancelEditCommonTag(); }
        window.handleDeleteTag = function() { if (editingTagOriginalValue && confirm(`確定要刪除標籤「${editingTagOriginalValue}」嗎？`)) { commonTags = commonTags.filter(t => t !== editingTagOriginalValue); localStorage.setItem('myInventoryCommonTags', JSON.stringify(commonTags)); cancelEditCommonTag(); } }
        window.addCategory = function(type) { const i = document.getElementById(`new-tag-${type}`); const val = i.value.trim(); if (val && !categoryOptions[type].includes(val)) { categoryOptions[type].push(val); localStorage.setItem('myInventoryCategories', JSON.stringify(categoryOptions)); renderSettingsCategories(); i.value = ''; } }
        window.removeCategory = function(type, val) { if (confirm(`確定要刪除「${val}」分類嗎？`)) { categoryOptions[type] = categoryOptions[type].filter(c => c !== val); localStorage.setItem('myInventoryCategories', JSON.stringify(categoryOptions)); renderSettingsCategories(); } }
        function saveApiUrl() { localStorage.setItem('myInventoryApiUrl', document.getElementById('settings-api-url').value.trim()); alert("連結已儲存"); fetchCloudData(); }
        function resetToDefaults() { if (confirm("重置分類與標籤設定？")) { localStorage.removeItem('myInventoryCategories'); localStorage.removeItem('myInventoryCommonTags'); categoryOptions = JSON.parse(JSON.stringify(defaultCategories)); commonTags = JSON.parse(JSON.stringify(defaultCommonTags)); renderSettingsCategories(); renderSettingsCommonTags(); alert("已重置"); } }

        // --- Modal Logic ---
        function openAddModal() {
            document.getElementById('edit-id').value = "";
            document.getElementById('add-form').reset();
            
            const isShopping = currentTab === 'shopping';
            document.getElementById('modal-title').innerText = isShopping ? "新增待買物品" : "新增物品";
            document.getElementById('submit-btn-text').innerText = isShopping ? "加入清單" : "加入庫存";
            document.getElementById('input-type').value = isShopping ? 'food' : currentTab;
            document.getElementById('input-status').value = isShopping ? 'to_buy' : 'in_stock';
            document.getElementById('input-barcode').value = ""; // 清空條碼
            
            const expiryContainer = document.getElementById('modal-expiry-container');
            const expiryInput = document.getElementById('input-expiry');
            
            if (isShopping) { expiryContainer.classList.add('hidden'); expiryInput.required = false; expiryInput.value = ""; } 
            else { expiryContainer.classList.remove('hidden'); expiryInput.required = true; expiryInput.valueAsDate = new Date(); }
            
            updateModalCategoryOptions(); renderModalQuickTags();
            const modal = document.getElementById('add-modal');
            modal.classList.remove('hidden');
            setTimeout(() => { document.getElementById('modal-content').classList.remove('scale-95', 'opacity-0'); document.getElementById('modal-content').classList.add('scale-100', 'opacity-100'); }, 10);
        }
        function closeModal(id) { const content = document.getElementById(id === 'add-modal' ? 'modal-content' : 'restock-content'); content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0'); setTimeout(() => document.getElementById(id).classList.add('hidden'), 200); }
        function renderModalQuickTags() { const c = document.getElementById('modal-quick-tags'); c.innerHTML = ''; commonTags.forEach(t => { const b = document.createElement('button'); b.type='button'; b.className = "text-xs bg-stone-100 text-stone-600 px-2 py-1 rounded hover:bg-stone-200"; b.innerText = t; b.onclick = () => { const i = document.getElementById('input-tags'); i.value = i.value ? i.value + ", " + t : t; }; c.appendChild(b); }); }
        function updateModalCategoryOptions() { const t = document.getElementById('input-type').value; const s = document.getElementById('input-category'); s.innerHTML = ''; (categoryOptions[t]||[]).forEach(c => { const o = document.createElement('option'); o.value = c; o.innerText = c; s.appendChild(o); }); }

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn'); const txt = document.getElementById('submit-btn-text').innerText;
            btn.innerHTML = '<div class="spinner border-white border-t-transparent"></div>'; btn.disabled = true;
            
            const editId = document.getElementById('edit-id').value;
            const inputStatus = document.getElementById('input-status').value;
            
            // 加入 Barcode 到 itemData 中
            const itemData = {
                type: document.getElementById('input-type').value,
                name: document.getElementById('input-name').value,
                expiry: inputStatus === 'to_buy' ? "" : document.getElementById('input-expiry').value,
                category: document.getElementById('input-category').value,
                qty: parseInt(document.getElementById('input-qty').value),
                tags: document.getElementById('input-tags').value,
                notes: document.getElementById('input-notes').value,
                image: "", 
                status: inputStatus, 
                brand: "",
                barcode: document.getElementById('input-barcode').value // 讀取條碼資料
            };

            let success = false;
            if(editId) {
                const old = inventory.find(i => i.id === editId);
                if(old) {
                    const updatedItem = { ...old, ...itemData };
                    success = await saveToCloud('update', updatedItem);
                    if (success) { inventory[inventory.findIndex(i => i.id === editId)] = updatedItem; switchTab(updatedItem.status === 'to_buy' ? 'shopping' : updatedItem.type); }
                }
            } else {
                success = await saveToCloud('create', itemData);
                if(success) {
                    const newItem = { ...itemData, id: String(success.id) };
                    inventory.push(newItem);
                    switchTab(newItem.status === 'to_buy' ? 'shopping' : newItem.type);
                }
            }

            if(success) { renderCards(); closeModal('add-modal'); }
            btn.innerHTML = `<span id="submit-btn-text">${txt}</span>`; btn.disabled = false;
        });

        window.onload = () => { updateModalCategoryOptions(); initFilters(); if(localStorage.getItem('myInventoryApiUrl')) fetchCloudData(); else renderCards(); }
    </script>
</body>
</html>
